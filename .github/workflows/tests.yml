name: "Tests"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  setup:
    name: Install dependencies
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Compute cache key
      id: cache-key
      run: echo "key=pip-${{ runner.os }}-3.11-${{ hashFiles('pyproject.toml') }}" >> "$GITHUB_OUTPUT"

    - name: Cache pip packages
      id: cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ steps.cache-key.outputs.key }}

    - name: Install package with all CI dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      run: pip install '.[test,dev]'

  tests:
    name: Pytest
    runs-on: ubuntu-latest
    needs: [setup]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Restore pip cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ needs.setup.outputs.cache-key }}

    - name: Install package with test dependencies
      run: pip install '.[test]'

    - name: Run tests on backend
      run: cd test && pytest

  lint:
    name: Pylint
    runs-on: ubuntu-latest
    needs: [setup]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Restore pip cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ needs.setup.outputs.cache-key }}

    - name: Install package with dev dependencies
      run: pip install '.[dev]'

    - name: Run linter
      run: pylint src/
